<title>Event Organization Chart</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:Arial,sans-serif;background:#f0f2f5;padding:12px 8px 50px;font-size:14px}

/* ── SUMMARY CARDS ── */
.summary{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
.sc{background:#fff;border:1px solid #ddd;border-radius:10px;padding:10px 16px;
    text-align:center;flex:1;min-width:60px;max-width:80px;box-shadow:0 1px 4px #0001}
.sc .sv{font-size:22px;font-weight:700;color:#1F3864}
.sc .sl{font-size:9px;color:#888;margin-top:2px;line-height:1.3}

/* ── APEX ── */
.tier-lbl{text-align:center;font-size:9px;font-weight:700;color:#bbb;
          letter-spacing:.09em;text-transform:uppercase;margin-bottom:5px;margin-top:4px}
.apex{display:flex;flex-direction:column;align-items:center}
.apex-box{background:#1F3864;color:#fff;border-radius:14px;padding:14px 20px;
          text-align:center;width:100%;max-width:340px;box-shadow:0 2px 10px #1F386444}
.apex-box .t1{font-size:24px;font-weight:700;letter-spacing:.08em}
.apex-box .t1s{font-size:11px;opacity:.8;margin-top:4px;line-height:1.5}
.conn{width:2px;height:18px;background:#aaa;margin:0 auto}

/* ── LEADS ── */
.leads-row{display:flex;flex-direction:column;gap:10px;margin-top:0;width:100%;max-width:420px;margin-left:auto;margin-right:auto}

.lead-box{border-radius:12px;padding:14px 16px;cursor:pointer;
  background:#FAECE7;border:2px solid #D85A30;user-select:none;
  box-shadow:0 2px 6px #D85A3022;active-opacity:.8}
.lead-box:active{opacity:.85}
.lead-top{display:flex;justify-content:space-between;align-items:center}
.lead-box .ln{font-size:15px;font-weight:700;color:#712B13}
.lead-box .ls{font-size:11px;color:#993C1D;margin-top:3px}
.lead-box .ch{font-size:13px;color:#D85A30;font-weight:700;flex-shrink:0;margin-left:8px}

/* ── KEY MEMBERS ── */
.km-sec{max-height:0;overflow:hidden;transition:max-height .4s ease}
.km-sec.open{max-height:8000px}
.km-divider{height:1px;background:#F0997B;margin:10px 0 8px}
.km-list{display:flex;flex-direction:column;gap:8px}

.km-item{border-radius:10px;padding:12px 14px;background:#E1F5EE;
  border:1.5px solid #1D9E75;cursor:pointer;active-opacity:.8}
.km-item:active{opacity:.85}
.km-top{display:flex;justify-content:space-between;align-items:center}
.km-item .kn{font-size:13px;font-weight:700;color:#085041}
.km-item .kn span{font-size:10px;color:#1D9E75;margin-right:4px}
.km-item .kr{font-size:10px;color:#0F6E56;margin-top:2px}
.km-item .kp{display:inline-block;background:#FAEEDA;border:1px solid #854F0B;
  border-radius:12px;padding:2px 10px;font-size:10px;color:#633806;
  margin-top:5px;font-weight:600}
.km-item .ch2{font-size:12px;color:#1D9E75;font-weight:700;flex-shrink:0;margin-left:8px}

/* ── DASAVATARAN ── */
.ds-sec{max-height:0;overflow:hidden;transition:max-height .35s ease}
.ds-sec.open{max-height:3000px}
.ds-list{background:#FFFDF5;border:1.5px solid #EF9F27;border-radius:10px;
  margin-top:8px;overflow:hidden}

/* FIXED HEADER */
.ds-hdr{display:flex;background:#FAEEDA;padding:6px 10px;
  border-bottom:1.5px solid #EF9F27}
.ds-hdr .h-sno{width:30px;font-size:10px;font-weight:700;color:#633806;flex-shrink:0}
.ds-hdr .h-name{flex:1;font-size:10px;font-weight:700;color:#633806;padding:0 6px}
.ds-hdr .h-ph{width:115px;font-size:10px;font-weight:700;color:#633806;
  flex-shrink:0;text-align:right}

/* FIXED DATA ROWS — full number always visible */
.ds-row{display:flex;align-items:flex-start;padding:6px 10px;
  border-bottom:1px solid #FAC77540}
.ds-row:last-child{border-bottom:none}
.ds-row:nth-child(odd){background:#FFFDF5}
.ds-row:nth-child(even){background:#FFF8E7}
.ds-row.missing{background:#FFE8E8}
.ds-sno{width:30px;flex-shrink:0;font-size:11px;font-weight:700;
  color:#854F0B;padding-top:1px}
.ds-row.missing .ds-sno{color:#C00000}
.ds-name{flex:1;font-size:11px;color:#412402;padding:0 6px;
  word-break:break-word;line-height:1.5}
.ds-ph{width:115px;flex-shrink:0;font-size:11px;font-weight:700;
  color:#1F3864;text-align:right;word-break:break-all;line-height:1.5}
.ds-row.missing .ds-ph{color:#C00000;font-style:italic;font-weight:400;font-size:10px}

/* ── LEGEND ── */
.legend{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;
  margin-top:18px;font-size:10px;color:#666}
.leg{display:flex;align-items:center;gap:4px}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.hint{text-align:center;font-size:10px;color:#bbb;margin-top:8px;line-height:1.6;padding:0 10px}
</style>
</head>

 const kml=document.createElement('div');kml.className='km-list';

 lead.keys.forEach(km=>{
  const idx=km.no-1;
  const slice=D.slice(idx*17,idx*17+17);

  const item=document.createElement('div');item.className='km-item';
  item.innerHTML=`<div class="km-top">
    <div><div class="kn"><span>#${km.no}</span>${km.name}</div>
    <div class="kr">Key Member &nbsp;·&nbsp; Overall #${km.ov} &nbsp;·&nbsp; S.No 1–17</div>
    <span class="kp">17 Dasavataran &#9660;</span></div>
    <div class="ch2">&#9660;</div></div>`;

  const dsec=document.createElement('div');dsec.className='ds-sec';
  const dlist=document.createElement('div');dlist.className='ds-list';

  const hdr=document.createElement('div');hdr.className='ds-hdr';
  hdr.innerHTML='<span class="h-sno">No</span><span class="h-name">Name</span><span class="h-ph">WhatsApp No.</span>';
  dlist.appendChild(hdr);

  slice.forEach((d,i)=>{
   const missing=d.p==='';
   const row=document.createElement('div');
   row.className='ds-row'+(missing?' missing':'');
   row.innerHTML=`<span class="ds-sno">${i+1}</span>
     <span class="ds-name">${d.n}</span>
     <span class="ds-ph">${missing?'':d.p}</span>`;
   dlist.appendChild(row);
  });

  dsec.appendChild(dlist);
  item.appendChild(dsec);

  item.addEventListener('click',e=>{
   e.stopPropagation();
   const open=dsec.classList.toggle('open');
   const pills=item.querySelectorAll('.kp,.ch2');
   pills[0].innerHTML='17 Dasavataran '+(open?'&#9650;':'&#9660;');
   pills[1].innerHTML=open?'&#9650;':'&#9660;';
  });
  kml.appendChild(item);
 });

 sec.appendChild(div);sec.appendChild(kml);
 box.addEventListener('click',()=>{
  const open=sec.classList.toggle('open');
  box.querySelector('.ch').innerHTML=open?'&#9650;':'&#9660;';
 });
 wrap.appendChild(box);wrap.appendChild(sec);
 cont.appendChild(wrap);
});
</script>
</body>
</html>
