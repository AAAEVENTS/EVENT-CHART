<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,sans-serif;background:#f4f6fb;min-height:100vh;padding:24px 10px 40px}

  h1{text-align:center;font-size:13px;color:#888;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}

  /* TIER 1 */
  .apex{display:flex;flex-direction:column;align-items:center;margin-bottom:0}
  .apex-box{background:#1F3864;color:#fff;border-radius:12px;padding:14px 48px;text-align:center;min-width:270px;box-shadow:0 2px 8px #1F386433}
  .apex-box .t1name{font-size:22px;font-weight:700;letter-spacing:.08em}
  .apex-box .t1sub{font-size:11px;opacity:.75;margin-top:4px}

  .conn-v{width:2px;height:22px;background:#888;margin:0 auto}

  /* TIER 2 */
  .tier-label{text-align:center;font-size:10px;font-weight:600;color:#aaa;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
  .leads-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:0}
  .lead-col{display:flex;flex-direction:column;align-items:center;width:152px}
  .lead-vline-top{width:2px;height:14px;background:#888}
  .lead-box{width:152px;border-radius:8px;padding:9px 10px 7px;cursor:pointer;text-align:center;
    background:#FAECE7;border:1.5px solid #D85A30;user-select:none;transition:all .15s;
    box-shadow:0 1px 4px #D85A3022}
  .lead-box:hover{opacity:.87;transform:translateY(-1px)}
  .lead-box .lname{font-size:12px;font-weight:700;color:#712B13;line-height:1.3}
  .lead-box .lrole{font-size:9.5px;color:#993C1D;margin-top:2px}
  .lead-box .chevron{font-size:9px;color:#D85A30;margin-top:4px;font-weight:600}

  /* TIER 3 */
  .km-section{width:152px;max-height:0;overflow:hidden;transition:max-height .4s ease}
  .km-section.open{max-height:1400px}
  .km-vline{width:2px;height:12px;background:#888;margin:0 auto}
  .km-hbar{width:120px;height:1.5px;background:#888;margin:0 auto}
  .km-list{display:flex;flex-direction:column;gap:5px;align-items:center;padding:6px 0 0}

  .km-item{width:142px;border-radius:6px;padding:6px 8px 5px;background:#E1F5EE;
    border:1px solid #1D9E75;cursor:pointer;user-select:none;transition:all .15s}
  .km-item:hover{opacity:.87}
  .km-item.tbd{background:#F1EFE8;border-color:#888}
  .km-item .kmname{font-size:11px;font-weight:700;color:#085041;line-height:1.3}
  .km-item.tbd .kmname{color:#444}
  .km-item .kmrole{font-size:9px;color:#0F6E56;margin-top:1px}
  .km-item.tbd .kmrole{color:#888}
  .km-item .kmpill{display:inline-block;background:#FAEEDA;border:1px solid #854F0B;
    border-radius:10px;padding:1px 7px;font-size:9px;color:#633806;margin-top:3px;font-weight:600}

  /* TIER 4 */
  .das-section{width:142px;max-height:0;overflow:hidden;transition:max-height .35s ease;margin-left:5px}
  .das-section.open{max-height:700px}
  .das-vline{width:1.5px;height:8px;background:#bbb;margin:0 auto}
  .das-list{background:#FFFDF5;border:1px solid #EF9F27;border-radius:6px;padding:5px 7px;margin-top:2px}
  .das-row{font-size:9px;color:#412402;padding:2px 0;border-bottom:1px solid #FAC77540;display:flex;justify-content:space-between;gap:4px}
  .das-row:last-child{border-bottom:none}
  .das-sno{color:#854F0B;font-weight:700;flex-shrink:0;min-width:16px}
  .das-name{flex:1}
  .das-phone{color:#854F0B;flex-shrink:0;font-size:8.5px}

  /* LEGEND */
  .legend{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:24px;font-size:10px;color:#666}
  .leg{display:flex;align-items:center;gap:5px}
  .leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
  .hint{text-align:center;font-size:10px;color:#aaa;margin-top:8px}

  .km-vline-item{width:1.5px;height:8px;background:#aaa;margin:0 auto}
</style>
</head>

  const sec=document.createElement('div');sec.className='km-section';
  const kvl=document.createElement('div');kvl.className='km-vline';
  const khb=document.createElement('div');khb.className='km-hbar';
  const kml=document.createElement('div');kml.className='km-list';

  lead.keys.forEach(km=>{
    const kvli=document.createElement('div');kvli.className='km-vline-item';
    const item=document.createElement('div');
    item.className='km-item'+(km.tbd?' tbd':'');
    item.innerHTML=`<div class="kmname">${km.name}</div>
      <div class="kmrole">Key Member &nbsp;·&nbsp; #${km.range}</div>
      <span class="kmpill">12 Dasavataran &#9660;</span>`;
    const dsec=document.createElement('div');dsec.className='das-section';
    const dvl=document.createElement('div');dvl.className='das-vline';
    const dlist=document.createElement('div');dlist.className='das-list';
    km.das.forEach(d=>{
      const row=document.createElement('div');row.className='das-row';
      row.innerHTML=`<span class="das-sno">${d.sno}.</span>
        <span class="das-name">${d.n}</span>
        <span class="das-phone">${d.p}</span>`;
      dlist.appendChild(row);
    });
    dsec.appendChild(dvl);dsec.appendChild(dlist);
    item.addEventListener('click',e=>{
      e.stopPropagation();
      const open=dsec.classList.toggle('open');
      item.querySelector('.kmpill').innerHTML='12 Dasavataran '+(open?'&#9650;':'&#9660;');
    });
    kml.appendChild(kvli);kml.appendChild(item);kml.appendChild(dsec);
  });

  sec.appendChild(kvl);sec.appendChild(khb);sec.appendChild(kml);
  box.addEventListener('click',()=>{
    const open=sec.classList.toggle('open');
    box.querySelector('.chevron').innerHTML=open?'&#9650; collapse':'&#9660; expand';
  });
  col.appendChild(vl);col.appendChild(box);col.appendChild(sec);
  container.appendChild(col);
});
</script>
</body>
</html>
